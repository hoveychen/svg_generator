<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fde2c4"/>
      <stop offset="0.45" stop-color="#f8b9a8"/>
      <stop offset="0.85" stop-color="#c89bbf"/>
      <stop offset="1" stop-color="#7a6c9b"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff5d6"/>
      <stop offset="0.4" stop-color="#ffd591"/>
      <stop offset="1" stop-color="#ffb37a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b48ab6"/>
      <stop offset="0.25" stop-color="#7c7aa8"/>
      <stop offset="0.6" stop-color="#3f5876"/>
      <stop offset="1" stop-color="#22324a"/>
    </linearGradient>
    <linearGradient id="distHill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8c7aa6"/>
      <stop offset="1" stop-color="#6a5d8c"/>
    </linearGradient>
    <linearGradient id="midHill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#56678a"/>
      <stop offset="1" stop-color="#3b4a6a"/>
    </linearGradient>
    <linearGradient id="bank" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6b7d4f"/>
      <stop offset="1" stop-color="#3d4c2e"/>
    </linearGradient>
    <linearGradient id="hull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4d7b5"/>
      <stop offset="0.5" stop-color="#d99a6c"/>
      <stop offset="1" stop-color="#7a3f28"/>
    </linearGradient>
    <linearGradient id="hullStripe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ee6f5a"/>
      <stop offset="1" stop-color="#b8412c"/>
    </linearGradient>
    <linearGradient id="cabin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff4d6"/>
      <stop offset="1" stop-color="#e8b878"/>
    </linearGradient>
    <linearGradient id="roof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d9534f"/>
      <stop offset="1" stop-color="#8b2e2a"/>
    </linearGradient>
    <linearGradient id="sail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fff8e8"/>
      <stop offset="0.5" stop-color="#ffdfb0"/>
      <stop offset="1" stop-color="#e69876"/>
    </linearGradient>
    <radialGradient id="lantern" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff6c2"/>
      <stop offset="0.5" stop-color="#ffc06a"/>
      <stop offset="1" stop-color="#ff7a3a" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="1024" height="1024" fill="url(#sky)"/>

  <!-- Sun glow -->
  <circle cx="700" cy="360" r="280" fill="url(#sun)"/>
  <circle cx="700" cy="360" r="70" fill="#fff2c2" opacity="0.95"/>

  <!-- Distant clouds -->
  <g opacity="0.55" fill="#fff1d4">
    <ellipse cx="180" cy="220" rx="120" ry="14"/>
    <ellipse cx="220" cy="240" rx="80" ry="9"/>
    <ellipse cx="860" cy="180" rx="110" ry="12"/>
    <ellipse cx="500" cy="160" rx="140" ry="10"/>
    <ellipse cx="900" cy="280" rx="70" ry="7"/>
  </g>

  <!-- Birds -->
  <g fill="none" stroke="#4a3a55" stroke-width="2.2" stroke-linecap="round">
    <path d="M320 280 q10 -10 20 0 q10 -10 20 0"/>
    <path d="M380 250 q8 -7 16 0 q8 -7 16 0"/>
    <path d="M260 320 q7 -6 14 0 q7 -6 14 0"/>
  </g>

  <!-- Far hills -->
  <path d="M0 540 Q160 470 320 500 T640 490 T1024 510 L1024 600 L0 600 Z" fill="url(#distHill)" opacity="0.85"/>

  <!-- Mid hills -->
  <path d="M0 580 Q200 520 420 550 T780 555 T1024 570 L1024 640 L0 640 Z" fill="url(#midHill)"/>

  <!-- Distant village -->
  <g opacity="0.7">
    <rect x="120" y="540" width="14" height="20" fill="#3a3550"/>
    <polygon points="120,540 127,530 134,540" fill="#5a3438"/>
    <rect x="138" y="544" width="10" height="16" fill="#3a3550"/>
    <polygon points="138,544 143,536 148,544" fill="#5a3438"/>
    <rect x="850" y="545" width="12" height="18" fill="#3a3550"/>
    <polygon points="850,545 856,536 862,545" fill="#5a3438"/>
    <rect x="866" y="548" width="9" height="15" fill="#3a3550"/>
    <polygon points="866,548 870,541 875,548" fill="#5a3438"/>
  </g>

  <!-- Water -->
  <rect x="0" y="600" width="1024" height="424" fill="url(#water)"/>

  <!-- Water sun reflection -->
  <g opacity="0.7">
    <ellipse cx="700" cy="620" rx="160" ry="6" fill="#ffd591"/>
    <ellipse cx="700" cy="650" rx="140" ry="4" fill="#ffc27a"/>
    <ellipse cx="700" cy="680" rx="120" ry="3" fill="#ffae6a"/>
    <ellipse cx="700" cy="710" rx="100" ry="3" fill="#ff9a5a"/>
    <ellipse cx="700" cy="740" rx="80" ry="2.5" fill="#ff8a4a"/>
    <ellipse cx="700" cy="770" rx="60" ry="2" fill="#ff7a3a"/>
    <ellipse cx="700" cy="800" rx="40" ry="1.5" fill="#ee6a2a"/>
  </g>

  <!-- Water ripples -->
  <g stroke="#d8c4d6" stroke-width="1.2" fill="none" opacity="0.45" stroke-linecap="round">
    <path d="M40 660 q20 -3 40 0 t40 0"/>
    <path d="M180 690 q15 -3 30 0 t30 0"/>
    <path d="M860 700 q18 -3 36 0 t36 0"/>
    <path d="M120 760 q22 -3 44 0 t44 0"/>
    <path d="M820 820 q20 -3 40 0 t40 0"/>
    <path d="M60 860 q18 -3 36 0 t36 0"/>
    <path d="M900 900 q15 -3 30 0 t30 0"/>
    <path d="M260 920 q22 -3 44 0 t44 0"/>
  </g>

  <!-- Left riverbank with grass -->
  <path d="M0 600 Q60 590 110 605 Q140 615 130 640 Q120 680 80 720 Q40 760 0 770 Z" fill="url(#bank)"/>
  <g stroke="#7d9a4a" stroke-width="2" stroke-linecap="round" fill="none">
    <path d="M20 600 l-2 -14"/>
    <path d="M30 598 l1 -16"/>
    <path d="M42 596 l-2 -18"/>
    <path d="M56 595 l2 -14"/>
    <path d="M70 596 l-1 -16"/>
    <path d="M85 600 l2 -12"/>
    <path d="M100 604 l-1 -14"/>
  </g>
  <!-- Little flowers on bank -->
  <g>
    <circle cx="40" cy="586" r="3" fill="#ffd1dc"/>
    <circle cx="62" cy="582" r="3" fill="#fff2a8"/>
    <circle cx="88" cy="586" r="2.5" fill="#ffd1dc"/>
  </g>

  <!-- Reeds on left bank -->
  <g stroke="#c2a14d" stroke-width="2.5" stroke-linecap="round" fill="none">
    <path d="M12 600 q-3 -40 6 -70"/>
    <path d="M28 600 q4 -50 -2 -82"/>
    <path d="M50 600 q-2 -36 4 -64"/>
  </g>
  <g fill="#8a6a32">
    <ellipse cx="18" cy="530" rx="3" ry="10"/>
    <ellipse cx="26" cy="518" rx="3" ry="10"/>
    <ellipse cx="54" cy="536" rx="3" ry="9"/>
  </g>

  <!-- Tree on left bank -->
  <g transform="translate(60 510)">
    <rect x="-3" y="0" width="6" height="90" fill="#3e2a1a"/>
    <circle cx="-12" cy="-8" r="22" fill="#4f6a3a"/>
    <circle cx="10" cy="-4" r="20" fill="#5e7a44"/>
    <circle cx="0" cy="-24" r="22" fill="#6a8a4c"/>
    <circle cx="-6" cy="-14" r="18" fill="#577a3e"/>
  </g>

  <!-- Right riverbank -->
  <path d="M1024 600 Q960 585 920 600 Q890 610 900 640 Q915 680 950 720 Q990 760 1024 770 Z" fill="url(#bank)"/>
  <g stroke="#7d9a4a" stroke-width="2" stroke-linecap="round" fill="none">
    <path d="M1000 600 l2 -14"/>
    <path d="M984 598 l-2 -16"/>
    <path d="M968 596 l2 -14"/>
    <path d="M952 596 l-2 -14"/>
    <path d="M938 600 l2 -12"/>
    <path d="M922 605 l-1 -12"/>
  </g>

  <!-- Lily pads -->
  <g>
    <ellipse cx="150" cy="780" rx="34" ry="9" fill="#4d7a4a"/>
    <path d="M150 780 l-26 -3" stroke="#2e4a2a" stroke-width="1.5"/>
    <circle cx="142" cy="772" r="5" fill="#ffd0e0"/>
    <circle cx="142" cy="772" r="2" fill="#ffefb0"/>

    <ellipse cx="880" cy="820" rx="40" ry="10" fill="#3e6a3c"/>
    <path d="M880 820 l28 -4" stroke="#2a3e26" stroke-width="1.5"/>
    <circle cx="894" cy="812" r="5" fill="#fff2a8"/>

    <ellipse cx="240" cy="900" rx="38" ry="9" fill="#46724a"/>
    <path d="M240 900 l-24 -3" stroke="#2a3e26" stroke-width="1.5"/>
  </g>

  <!-- BOAT — drawn back-to-front -->
  <g transform="translate(440 640)">
    <!-- Boat shadow on water -->
    <ellipse cx="80" cy="200" rx="170" ry="14" fill="#1a2238" opacity="0.5"/>

    <!-- Reflection of boat (in water) -->
    <g opacity="0.35" transform="translate(0 200) scale(1 -0.6)">
      <path d="M-70 0 Q80 -70 230 0 L210 50 Q80 90 -50 50 Z" fill="#7a3f28"/>
      <rect x="40" y="-60" width="80" height="40" fill="#e8b878"/>
      <polygon points="40,-60 120,-60 130,-80 30,-80" fill="#8b2e2a"/>
    </g>

    <!-- Mast and sail (behind hull top, in front of cabin) drawn later, but rope strings first -->

    <!-- Hull bottom (curved boat shape) -->
    <path d="M-70 60 Q-50 -10 0 -20 L160 -20 Q210 -10 230 60 Q210 130 80 145 Q-50 130 -70 60 Z" fill="url(#hull)"/>

    <!-- Hull red stripe -->
    <path d="M-66 50 Q-46 -2 4 -10 L156 -10 Q206 -2 226 50 Q220 70 200 76 L-40 76 Q-60 70 -66 50 Z" fill="url(#hullStripe)"/>

    <!-- Hull planks -->
    <g stroke="#5a2a18" stroke-width="1.2" opacity="0.7" fill="none">
      <path d="M-60 30 Q80 18 220 30"/>
      <path d="M-58 90 Q80 102 218 90"/>
      <path d="M-50 120 Q80 130 210 120"/>
    </g>

    <!-- Portholes -->
    <g>
      <circle cx="20" cy="60" r="9" fill="#2a3a55"/>
      <circle cx="20" cy="60" r="9" fill="none" stroke="#f4d7b5" stroke-width="2.5"/>
      <circle cx="18" cy="57" r="3" fill="#fff5d6" opacity="0.7"/>
      <circle cx="80" cy="60" r="9" fill="#2a3a55"/>
      <circle cx="80" cy="60" r="9" fill="none" stroke="#f4d7b5" stroke-width="2.5"/>
      <circle cx="78" cy="57" r="3" fill="#fff5d6" opacity="0.7"/>
      <circle cx="140" cy="60" r="9" fill="#2a3a55"/>
      <circle cx="140" cy="60" r="9" fill="none" stroke="#f4d7b5" stroke-width="2.5"/>
      <circle cx="138" cy="57" r="3" fill="#fff5d6" opacity="0.7"/>
    </g>

    <!-- Deck rim -->
    <path d="M-70 -20 Q80 -34 230 -20 Q210 -8 80 -8 Q-50 -8 -70 -20 Z" fill="#6b3a22"/>
    <path d="M-66 -22 Q80 -32 226 -22" stroke="#fff0c8" stroke-width="2" fill="none" opacity="0.7"/>

    <!-- Cabin -->
    <rect x="40" y="-80" width="100" height="60" rx="6" fill="url(#cabin)"/>
    <!-- Cabin window -->
    <rect x="55" y="-66" width="30" height="26" rx="3" fill="#7ec0d6"/>
    <line x1="70" y1="-66" x2="70" y2="-40" stroke="#fff" stroke-width="1.5"/>
    <line x1="55" y1="-53" x2="85" y2="-53" stroke="#fff" stroke-width="1.5"/>
    <rect x="55" y="-66" width="30" height="26" rx="3" fill="none" stroke="#7a4628" stroke-width="2"/>
    <!-- Cabin door -->
    <rect x="100" y="-60" width="22" height="40" rx="3" fill="#7a4628"/>
    <circle cx="117" cy="-40" r="1.6" fill="#fff2a8"/>
    <!-- Roof -->
    <polygon points="36,-80 144,-80 158,-96 22,-96" fill="url(#roof)"/>
    <polygon points="36,-80 144,-80 158,-96 22,-96" fill="none" stroke="#5a1e1a" stroke-width="1.5"/>
    <!-- Chimney -->
    <rect x="120" y="-114" width="10" height="20" fill="#3a3550"/>
    <rect x="118" y="-116" width="14" height="6" fill="#5a4a6a"/>
    <!-- Smoke -->
    <g fill="#fff" opacity="0.7" filter="url(#soft)">
      <ellipse cx="128" cy="-130" rx="8" ry="6"/>
      <ellipse cx="135" cy="-146" rx="11" ry="8"/>
      <ellipse cx="124" cy="-164" rx="14" ry="10"/>
      <ellipse cx="138" cy="-184" rx="17" ry="12"/>
    </g>

    <!-- Mast (in front of cabin) -->
    <rect x="-6" y="-220" width="6" height="200" fill="#5a3a22"/>
    <circle cx="-3" cy="-222" r="5" fill="#c2a14d"/>

    <!-- Flag rope -->
    <path d="M-3 -222 Q60 -210 130 -160" stroke="#3a2a18" stroke-width="1" fill="none"/>
    <!-- Pennant string flags -->
    <g>
      <polygon points="20,-218 32,-214 20,-210" fill="#ee6f5a"/>
      <polygon points="44,-214 56,-208 44,-204" fill="#fff2a8"/>
      <polygon points="68,-208 80,-200 68,-196" fill="#7ec0d6"/>
      <polygon points="92,-198 104,-188 92,-184" fill="#ee6f5a"/>
      <polygon points="114,-184 124,-172 114,-170" fill="#fff2a8"/>
    </g>

    <!-- Sail -->
    <path d="M0 -210 Q70 -200 90 -60 Q40 -50 0 -60 Z" fill="url(#sail)"/>
    <path d="M0 -210 Q40 -130 0 -60" stroke="#c2906a" stroke-width="1.5" fill="none" opacity="0.5"/>
    <!-- Sail patch heart -->
    <path d="M28 -150 q-6 -10 -14 -4 q-8 6 0 16 l14 14 l14 -14 q8 -10 0 -16 q-8 -6 -14 4 Z" fill="#ee6f5a" opacity="0.85"/>

    <!-- Flag at top -->
    <polygon points="-3,-222 -3,-238 24,-230" fill="#ee6f5a"/>
    <polygon points="-3,-222 -3,-238 24,-230" fill="none" stroke="#7a2a1c" stroke-width="1"/>

    <!-- Lantern hanging on bow -->
    <line x1="-50" y1="-20" x2="-50" y2="-2" stroke="#3a2a18" stroke-width="1.2"/>
    <circle cx="-50" cy="10" r="12" fill="url(#lantern)"/>
    <ellipse cx="-50" cy="10" rx="6" ry="8" fill="#ffd591"/>
    <rect x="-54" y="-4" width="8" height="3" fill="#7a4628"/>
    <rect x="-54" y="20" width="8" height="3" fill="#7a4628"/>

    <!-- Tiny cat on deck -->
    <g transform="translate(-30 -22)">
      <ellipse cx="0" cy="0" rx="14" ry="7" fill="#f4f4ee"/>
      <circle cx="-12" cy="-4" r="7" fill="#f4f4ee"/>
      <polygon points="-16,-9 -14,-15 -10,-10" fill="#f4f4ee"/>
      <polygon points="-10,-10 -8,-15 -6,-9" fill="#f4f4ee"/>
      <circle cx="-14" cy="-4" r="1.2" fill="#2a2030"/>
      <circle cx="-10" cy="-4" r="1.2" fill="#2a2030"/>
      <path d="M-12 -2 q1 1 2 0" stroke="#2a2030" stroke-width="0.8" fill="none"/>
      <path d="M12 -2 q6 -4 8 -10" stroke="#f4f4ee" stroke-width="4" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Bow rope coil -->
    <g transform="translate(-58 -10)">
      <ellipse cx="0" cy="0" rx="8" ry="3" fill="none" stroke="#c2a14d" stroke-width="1.5"/>
      <ellipse cx="0" cy="3" rx="8" ry="3" fill="none" stroke="#a8884a" stroke-width="1.5"/>
    </g>

    <!-- Bow wave splash -->
    <g fill="#fff" opacity="0.85">
      <ellipse cx="-76" cy="78" rx="14" ry="3"/>
      <ellipse cx="-88" cy="92" rx="10" ry="2.5"/>
      <ellipse cx="-66" cy="98" rx="16" ry="3"/>
    </g>
    <g fill="#fff" opacity="0.85">
      <ellipse cx="236" cy="78" rx="14" ry="3"/>
      <ellipse cx="248" cy="92" rx="10" ry="2.5"/>
      <ellipse cx="226" cy="98" rx="16" ry="3"/>
    </g>
  </g>

  <!-- Foreground water ripples around boat -->
  <g stroke="#d8c4d6" stroke-width="1.4" fill="none" opacity="0.6" stroke-linecap="round">
    <path d="M340 800 q40 -6 80 0 t80 0 t80 0 t80 0"/>
    <path d="M380 840 q40 -6 80 0 t80 0 t80 0"/>
    <path d="M420 880 q40 -6 80 0 t80 0"/>
  </g>

  <!-- Foreground reeds front-right -->
  <g stroke="#9a7a3a" stroke-width="3" stroke-linecap="round" fill="none">
    <path d="M980 1024 q-6 -80 8 -160"/>
    <path d="M1004 1024 q4 -90 -6 -180"/>
    <path d="M956 1024 q-8 -60 4 -130"/>
  </g>
  <g fill="#7a5a22">
    <ellipse cx="988" cy="864" rx="4" ry="14"/>
    <ellipse cx="998" cy="844" rx="4" ry="14"/>
    <ellipse cx="960" cy="894" rx="4" ry="12"/>
  </g>

  <!-- Foreground grass left -->
  <g stroke="#5a7a3a" stroke-width="2.5" stroke-linecap="round" fill="none">
    <path d="M30 1024 q4 -50 -2 -90"/>
    <path d="M48 1024 q-3 -60 6 -110"/>
    <path d="M70 1024 q5 -45 -4 -80"/>
    <path d="M14 1024 q-2 -40 4 -70"/>
  </g>

  <!-- Fireflies / sparkles -->
  <g fill="#fff2a8">
    <circle cx="200" cy="500" r="2"/>
    <circle cx="260" cy="460" r="1.6"/>
    <circle cx="820" cy="420" r="2"/>
    <circle cx="880" cy="500" r="1.6"/>
    <circle cx="140" cy="700" r="1.8"/>
    <circle cx="940" cy="660" r="1.8"/>
  </g>
</svg>
